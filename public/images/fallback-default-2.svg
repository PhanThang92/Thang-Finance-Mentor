<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d2522"/>
      <stop offset="55%" stop-color="#091b18"/>
      <stop offset="100%" stop-color="#040d0b"/>
    </linearGradient>
    <linearGradient id="wave-band" x1="0" y1="0" x2="0" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22917f" stop-opacity="0"/>
      <stop offset="44%"  stop-color="#22917f" stop-opacity="0.07"/>
      <stop offset="56%"  stop-color="#22917f" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#22917f" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow-l" cx="18%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#1e8472" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#1e8472" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-r" cx="82%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#22917f" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22917f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow-l)"/>
  <rect width="1600" height="900" fill="url(#glow-r)"/>

  <!-- Central wave glow band -->
  <rect x="0" y="280" width="1600" height="340" fill="url(#wave-band)"/>

  <!-- Fine structural grid -->
  <g stroke="rgba(52,160,140,0.035)" stroke-width="1">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
  </g>
  <g stroke="rgba(52,160,140,0.028)" stroke-width="1">
    <line x1="320"  y1="0" x2="320"  y2="900"/>
    <line x1="640"  y1="0" x2="640"  y2="900"/>
    <line x1="960"  y1="0" x2="960"  y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
  </g>

  <!-- Parallel wave lines — flowing horizontal curves stacked -->
  <!-- Wave 1 — far top -->
  <path d="M 0,168 C 200,155 400,185 600,168 C 800,152 1000,178 1200,165 C 1400,152 1520,172 1600,165"
    stroke="rgba(52,160,140,0.05)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Wave 2 -->
  <path d="M 0,216 C 200,202 400,236 600,218 C 800,200 1000,228 1200,213 C 1400,198 1520,222 1600,214"
    stroke="rgba(52,160,140,0.08)" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Wave 3 -->
  <path d="M 0,270 C 200,254 400,292 600,273 C 800,254 1000,285 1200,268 C 1400,252 1520,278 1600,269"
    stroke="rgba(52,160,140,0.13)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Wave 4 — centre bright -->
  <path d="M 0,330 C 200,314 400,354 600,334 C 800,314 1000,348 1200,329 C 1400,311 1520,338 1600,329"
    stroke="rgba(52,160,140,0.36)" stroke-width="2" stroke-linecap="round"/>
  <!-- Wave 5 — centre secondary -->
  <path d="M 0,386 C 200,370 400,408 600,389 C 800,371 1000,402 1200,385 C 1400,368 1520,393 1600,385"
    stroke="rgba(52,160,140,0.28)" stroke-width="1.7" stroke-linecap="round"/>
  <!-- Wave 6 -->
  <path d="M 0,445 C 200,430 400,466 600,448 C 800,430 1000,460 1200,444 C 1400,428 1520,452 1600,445"
    stroke="rgba(52,160,140,0.15)" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Wave 7 -->
  <path d="M 0,506 C 200,492 400,525 600,508 C 800,492 1000,520 1200,505 C 1400,490 1520,514 1600,507"
    stroke="rgba(52,160,140,0.09)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Wave 8 — far bottom -->
  <path d="M 0,565 C 200,552 400,582 600,567 C 800,552 1000,578 1200,564 C 1400,550 1520,572 1600,565"
    stroke="rgba(52,160,140,0.05)" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Left vertical rule -->
  <line x1="156" y1="110" x2="156" y2="790" stroke="rgba(52,160,140,0.08)" stroke-width="1"/>

  <!-- Data node accents on center wave -->
  <circle cx="560"  cy="334" r="7"  fill="rgba(52,160,140,0.65)"/>
  <circle cx="560"  cy="334" r="16" fill="rgba(52,160,140,0.13)"/>
  <circle cx="560"  cy="334" r="28" fill="rgba(52,160,140,0.05)"/>

  <circle cx="960"  cy="329" r="9"  fill="rgba(52,160,140,0.72)"/>
  <circle cx="960"  cy="329" r="20" fill="rgba(52,160,140,0.14)"/>
  <circle cx="960"  cy="329" r="34" fill="rgba(52,160,140,0.05)"/>

  <circle cx="1360" cy="326" r="6"  fill="rgba(52,160,140,0.55)"/>
  <circle cx="1360" cy="326" r="14" fill="rgba(52,160,140,0.11)"/>

  <!-- Right detail panel — staggered data bars -->
  <g stroke="rgba(52,160,140,0.18)" stroke-width="1" stroke-linecap="round">
    <line x1="1420" y1="290" x2="1560" y2="290"/>
    <line x1="1440" y1="318" x2="1560" y2="318"/>
    <line x1="1460" y1="346" x2="1560" y2="346"/>
    <line x1="1480" y1="374" x2="1560" y2="374"/>
  </g>
  <circle cx="1420" cy="290" r="4" fill="rgba(52,160,140,0.50)"/>
  <circle cx="1440" cy="318" r="3.5" fill="rgba(52,160,140,0.40)"/>
  <circle cx="1460" cy="346" r="3.5" fill="rgba(52,160,140,0.35)"/>
  <circle cx="1480" cy="374" r="3"   fill="rgba(52,160,140,0.30)"/>

  <!-- Dot grid — top right -->
  <g fill="rgba(52,160,140,0.22)">
    <circle cx="1432" cy="72"  r="2.5"/><circle cx="1472" cy="72"  r="2.5"/><circle cx="1512" cy="72"  r="2.5"/><circle cx="1552" cy="72" r="2"/>
    <circle cx="1432" cy="108" r="2.5"/><circle cx="1472" cy="108" r="2.5"/><circle cx="1512" cy="108" r="2"/>
    <circle cx="1432" cy="144" r="2"/><circle cx="1472" cy="144" r="2"/>
  </g>

  <!-- Dot grid — bottom left -->
  <g fill="rgba(52,160,140,0.16)">
    <circle cx="80"  cy="828" r="2"/><circle cx="120" cy="828" r="2"/><circle cx="160" cy="828" r="2"/>
    <circle cx="80"  cy="858" r="2"/><circle cx="120" cy="858" r="2"/>
  </g>

  <!-- Corner bracket marks -->
  <path d="M 44,44 L 44,88 L 80,88" stroke="rgba(52,160,140,0.28)" stroke-width="1.5" stroke-linecap="square" fill="none"/>
  <path d="M 1556,44 L 1556,88 L 1520,88" stroke="rgba(52,160,140,0.22)" stroke-width="1.5" stroke-linecap="square" fill="none"/>
  <path d="M 44,856 L 44,812 L 80,812" stroke="rgba(52,160,140,0.18)" stroke-width="1.5" stroke-linecap="square" fill="none"/>

  <!-- Base rule -->
  <line x1="0" y1="878" x2="1600" y2="878" stroke="rgba(52,160,140,0.12)" stroke-width="1"/>
</svg>
