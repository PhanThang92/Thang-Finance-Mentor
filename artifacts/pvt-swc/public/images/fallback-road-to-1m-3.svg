<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c2421"/>
      <stop offset="100%" stop-color="#050d0b"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22917f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22917f" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="120" y1="490" x2="1080" y2="490" stroke="rgba(52,160,140,0.12)" stroke-width="1"/>
  <line x1="120" y1="120" x2="120" y2="490" stroke="rgba(52,160,140,0.08)" stroke-width="1"/>
  <line x1="120" y1="390" x2="1080" y2="390" stroke="rgba(52,160,140,0.05)" stroke-width="1"/>
  <line x1="120" y1="290" x2="1080" y2="290" stroke="rgba(52,160,140,0.05)" stroke-width="1"/>
  <line x1="120" y1="190" x2="1080" y2="190" stroke="rgba(52,160,140,0.05)" stroke-width="1"/>

  <!-- Exponential / compound growth curve (J-curve shape) -->
  <!-- Area under curve -->
  <path d="M 130 480 C 230 475, 380 470, 500 450 C 600 432, 680 400, 750 360 C 820 318, 880 265, 930 205 C 960 168, 990 145, 1060 115 L 1060 490 Z"
    fill="url(#areaFill)"/>

  <!-- Main curve line -->
  <path d="M 130 480 C 230 475, 380 470, 500 450 C 600 432, 680 400, 750 360 C 820 318, 880 265, 930 205 C 960 168, 990 145, 1060 115"
    stroke="rgba(52,160,140,0.65)" stroke-width="2" stroke-linecap="round"/>

  <!-- Inflection / highlight segments -->
  <path d="M 750 360 C 820 318, 880 265, 930 205 C 960 168, 990 145, 1060 115"
    stroke="rgba(52,160,140,0.90)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Milestone markers -->
  <!-- Milestone 1 -->
  <circle cx="320" cy="470" r="5" fill="rgba(52,160,140,0.45)"/>
  <circle cx="320" cy="470" r="10" fill="rgba(52,160,140,0.10)"/>
  <line x1="320" y1="460" x2="320" y2="490" stroke="rgba(52,160,140,0.25)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Milestone 2 -->
  <circle cx="620" cy="424" r="5.5" fill="rgba(52,160,140,0.58)"/>
  <circle cx="620" cy="424" r="11"  fill="rgba(52,160,140,0.12)"/>
  <line x1="620" y1="413" x2="620" y2="490" stroke="rgba(52,160,140,0.22)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Milestone 3 -->
  <circle cx="870" cy="272" r="6"  fill="rgba(52,160,140,0.72)"/>
  <circle cx="870" cy="272" r="13" fill="rgba(52,160,140,0.14)"/>
  <line x1="870" y1="259" x2="870" y2="490" stroke="rgba(52,160,140,0.18)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Goal star at peak -->
  <circle cx="1060" cy="115" r="22" fill="rgba(52,160,140,0.12)" stroke="rgba(52,160,140,0.45)" stroke-width="1.2"/>
  <text x="1060" y="119" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700"
    fill="rgba(52,160,140,0.92)">$1M</text>

  <!-- Right-side glow around peak -->
  <ellipse cx="1060" cy="200" rx="200" ry="250" fill="rgba(34,145,127,0.06)"/>

  <!-- Accent dots top-left -->
  <g fill="rgba(52,160,140,0.16)">
    <circle cx="80"  cy="80"  r="2"/><circle cx="110" cy="80"  r="2"/><circle cx="140" cy="80"  r="2"/>
    <circle cx="80"  cy="110" r="2"/><circle cx="110" cy="110" r="2"/><circle cx="140" cy="110" r="2"/>
  </g>

  <line x1="0" y1="600" x2="1200" y2="600" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>
  <text x="60" y="580" font-family="system-ui, sans-serif" font-size="11" font-weight="600"
    letter-spacing="0.18em" fill="rgba(255,255,255,0.20)">THẮNG SWC · ROAD TO $1M</text>
</svg>
