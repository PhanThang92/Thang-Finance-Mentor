<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e2724"/>
      <stop offset="100%" stop-color="#060e0c"/>
    </linearGradient>
    <linearGradient id="waveGlow" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#22917f" stop-opacity="0.04"/>
      <stop offset="50%"  stop-color="#22917f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22917f" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Central horizontal glow band -->
  <rect x="0" y="240" width="1200" height="150" fill="url(#waveGlow)"/>

  <!-- Wave lines — flowing horizontal curves (parallel, evenly spaced) -->
  <!-- Wave 1 (top, faintest) -->
  <path d="M 0 145 C 150 135, 300 165, 450 150 C 600 135, 750 155, 900 145 C 1050 135, 1150 155, 1200 148"
    stroke="rgba(52,160,140,0.07)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Wave 2 -->
  <path d="M 0 185 C 150 172, 300 205, 450 190 C 600 175, 750 200, 900 185 C 1050 172, 1150 198, 1200 185"
    stroke="rgba(52,160,140,0.10)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Wave 3 -->
  <path d="M 0 225 C 150 210, 300 248, 450 232 C 600 215, 750 245, 900 228 C 1050 212, 1150 240, 1200 225"
    stroke="rgba(52,160,140,0.15)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Wave 4 (centre — brightest) -->
  <path d="M 0 268 C 150 250, 300 292, 450 275 C 600 258, 750 290, 900 272 C 1050 255, 1150 285, 1200 268"
    stroke="rgba(52,160,140,0.35)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Wave 5 (second centre) -->
  <path d="M 0 310 C 150 295, 300 332, 450 315 C 600 300, 750 330, 900 312 C 1050 296, 1150 325, 1200 310"
    stroke="rgba(52,160,140,0.28)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Wave 6 -->
  <path d="M 0 355 C 150 340, 300 378, 450 360 C 600 343, 750 373, 900 357 C 1050 340, 1150 368, 1200 355"
    stroke="rgba(52,160,140,0.16)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Wave 7 -->
  <path d="M 0 400 C 150 385, 300 420, 450 403 C 600 387, 750 415, 900 400 C 1050 384, 1150 412, 1200 400"
    stroke="rgba(52,160,140,0.11)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Wave 8 (faintest) -->
  <path d="M 0 445 C 150 430, 300 462, 450 446 C 600 430, 750 458, 900 443 C 1050 428, 1150 455, 1200 445"
    stroke="rgba(52,160,140,0.07)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Vertical rule line (left) -->
  <line x1="120" y1="100" x2="120" y2="530" stroke="rgba(52,160,140,0.08)" stroke-width="1"/>

  <!-- Accent data node on center wave -->
  <circle cx="450"  cy="275" r="5.5" fill="rgba(52,160,140,0.55)"/>
  <circle cx="450"  cy="275" r="11"  fill="rgba(52,160,140,0.12)"/>
  <circle cx="750"  cy="290" r="5.5" fill="rgba(52,160,140,0.55)"/>
  <circle cx="750"  cy="290" r="11"  fill="rgba(52,160,140,0.12)"/>
  <circle cx="1050" cy="268" r="4.5" fill="rgba(52,160,140,0.45)"/>
  <circle cx="1050" cy="268" r="9"   fill="rgba(52,160,140,0.10)"/>

  <!-- Accent dots — top right -->
  <g fill="rgba(52,160,140,0.16)">
    <circle cx="1050" cy="90"  r="2"/><circle cx="1080" cy="90"  r="2"/><circle cx="1110" cy="90"  r="2"/>
    <circle cx="1050" cy="120" r="2"/><circle cx="1080" cy="120" r="2"/><circle cx="1110" cy="120" r="2"/>
    <circle cx="1050" cy="150" r="2"/><circle cx="1080" cy="150" r="2"/><circle cx="1110" cy="150" r="2"/>
  </g>
  <!-- Accent dots — bottom left -->
  <g fill="rgba(52,160,140,0.12)">
    <circle cx="80"  cy="490" r="2"/><circle cx="110" cy="490" r="2"/><circle cx="140" cy="490" r="2"/>
    <circle cx="80"  cy="520" r="2"/><circle cx="110" cy="520" r="2"/><circle cx="140" cy="520" r="2"/>
  </g>

  <line x1="0" y1="600" x2="1200" y2="600" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>
  <text x="60" y="580" font-family="system-ui, sans-serif" font-size="11" font-weight="600"
    letter-spacing="0.18em" fill="rgba(255,255,255,0.20)">THẮNG SWC · TÀI CHÍNH</text>
</svg>
