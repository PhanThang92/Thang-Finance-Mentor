<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#091f1d"/>
      <stop offset="100%" stop-color="#040c0a"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22917f" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22917f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Background context circles -->
  <circle cx="600" cy="315" r="400" stroke="rgba(52,160,140,0.03)" stroke-width="1"/>
  <circle cx="600" cy="315" r="280" stroke="rgba(52,160,140,0.05)" stroke-width="1"/>

  <!-- Node definitions: (x, y, r, opacity) -->
  <!-- Edges first (drawn behind nodes) -->
  <!-- Core to satellite connections -->
  <line x1="600" y1="315" x2="380" y2="200" stroke="rgba(52,160,140,0.18)" stroke-width="1.2"/>
  <line x1="600" y1="315" x2="770" y2="170" stroke="rgba(52,160,140,0.18)" stroke-width="1.2"/>
  <line x1="600" y1="315" x2="900" y2="310" stroke="rgba(52,160,140,0.18)" stroke-width="1.2"/>
  <line x1="600" y1="315" x2="820" y2="460" stroke="rgba(52,160,140,0.18)" stroke-width="1.2"/>
  <line x1="600" y1="315" x2="430" y2="470" stroke="rgba(52,160,140,0.18)" stroke-width="1.2"/>
  <line x1="600" y1="315" x2="260" y2="350" stroke="rgba(52,160,140,0.18)" stroke-width="1.2"/>

  <!-- Satellite-to-satellite connections (secondary ring) -->
  <line x1="380" y1="200" x2="770" y2="170" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>
  <line x1="770" y1="170" x2="900" y2="310" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>
  <line x1="900" y1="310" x2="820" y2="460" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>
  <line x1="820" y1="460" x2="430" y2="470" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>
  <line x1="430" y1="470" x2="260" y2="350" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>
  <line x1="260" y1="350" x2="380" y2="200" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>

  <!-- Tertiary outlier connections -->
  <line x1="380" y1="200" x2="220" y2="140" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="770" y1="170" x2="920" y2="110" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="900" y1="310" x2="1070" y2="280" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="820" y1="460" x2="960" y2="530" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="260" y1="350" x2="130" y2="430" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>

  <!-- Tertiary nodes (smallest) -->
  <circle cx="220"  cy="140" r="5"  fill="rgba(52,160,140,0.30)"/>
  <circle cx="920"  cy="110" r="5"  fill="rgba(52,160,140,0.30)"/>
  <circle cx="1070" cy="280" r="5"  fill="rgba(52,160,140,0.30)"/>
  <circle cx="960"  cy="530" r="5"  fill="rgba(52,160,140,0.30)"/>
  <circle cx="130"  cy="430" r="5"  fill="rgba(52,160,140,0.30)"/>

  <!-- Satellite nodes (medium) -->
  <circle cx="380" cy="200" r="14" fill="rgba(52,160,140,0.10)" stroke="rgba(52,160,140,0.30)" stroke-width="1"/>
  <circle cx="380" cy="200" r="7"  fill="rgba(52,160,140,0.52)"/>

  <circle cx="770" cy="170" r="14" fill="rgba(52,160,140,0.10)" stroke="rgba(52,160,140,0.30)" stroke-width="1"/>
  <circle cx="770" cy="170" r="7"  fill="rgba(52,160,140,0.52)"/>

  <circle cx="900" cy="310" r="16" fill="rgba(52,160,140,0.10)" stroke="rgba(52,160,140,0.30)" stroke-width="1"/>
  <circle cx="900" cy="310" r="8"  fill="rgba(52,160,140,0.58)"/>

  <circle cx="820" cy="460" r="12" fill="rgba(52,160,140,0.10)" stroke="rgba(52,160,140,0.28)" stroke-width="1"/>
  <circle cx="820" cy="460" r="6"  fill="rgba(52,160,140,0.48)"/>

  <circle cx="430" cy="470" r="12" fill="rgba(52,160,140,0.10)" stroke="rgba(52,160,140,0.28)" stroke-width="1"/>
  <circle cx="430" cy="470" r="6"  fill="rgba(52,160,140,0.48)"/>

  <circle cx="260" cy="350" r="14" fill="rgba(52,160,140,0.10)" stroke="rgba(52,160,140,0.28)" stroke-width="1"/>
  <circle cx="260" cy="350" r="7"  fill="rgba(52,160,140,0.50)"/>

  <!-- Core node (largest, brightest) -->
  <circle cx="600" cy="315" r="240" fill="url(#coreGlow)"/>
  <circle cx="600" cy="315" r="35" fill="rgba(52,160,140,0.08)" stroke="rgba(52,160,140,0.22)" stroke-width="1"/>
  <circle cx="600" cy="315" r="18" fill="rgba(52,160,140,0.22)" stroke="rgba(52,160,140,0.55)" stroke-width="1"/>
  <circle cx="600" cy="315" r="8"  fill="rgba(52,160,140,0.85)"/>

  <!-- Accent dots -->
  <g fill="rgba(52,160,140,0.14)">
    <circle cx="80"  cy="80"  r="2"/><circle cx="110" cy="80"  r="2"/><circle cx="140" cy="80"  r="2"/>
    <circle cx="80"  cy="110" r="2"/><circle cx="110" cy="110" r="2"/><circle cx="140" cy="110" r="2"/>
  </g>

  <line x1="0" y1="600" x2="1200" y2="600" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>
  <text x="60" y="580" font-family="system-ui, sans-serif" font-size="11" font-weight="600"
    letter-spacing="0.18em" fill="rgba(255,255,255,0.20)">THẮNG SWC · ATLAS</text>
</svg>
