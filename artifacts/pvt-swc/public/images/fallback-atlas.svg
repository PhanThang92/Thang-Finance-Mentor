<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#091f1d"/>
      <stop offset="100%" stop-color="#040c0b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Perspective grid (isometric-ish) -->
  <!-- Horizontal lines converging to vanishing point at ~600,200 -->
  <line x1="0"    y1="630" x2="600" y2="200" stroke="rgba(52,160,140,0.06)" stroke-width="1"/>
  <line x1="150"  y1="630" x2="600" y2="200" stroke="rgba(52,160,140,0.06)" stroke-width="1"/>
  <line x1="300"  y1="630" x2="600" y2="200" stroke="rgba(52,160,140,0.06)" stroke-width="1"/>
  <line x1="450"  y1="630" x2="600" y2="200" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="600"  y1="630" x2="600" y2="200" stroke="rgba(52,160,140,0.09)" stroke-width="1"/>
  <line x1="750"  y1="630" x2="600" y2="200" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="900"  y1="630" x2="600" y2="200" stroke="rgba(52,160,140,0.06)" stroke-width="1"/>
  <line x1="1050" y1="630" x2="600" y2="200" stroke="rgba(52,160,140,0.06)" stroke-width="1"/>
  <line x1="1200" y1="630" x2="600" y2="200" stroke="rgba(52,160,140,0.06)" stroke-width="1"/>

  <!-- Cross lines (horizontal, fading toward VP) -->
  <line x1="0" y1="550" x2="1200" y2="550" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="60" y1="490" x2="1140" y2="490" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="120" y1="430" x2="1080" y2="430" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="200" y1="370" x2="1000" y2="370" stroke="rgba(52,160,140,0.07)" stroke-width="1"/>
  <line x1="280" y1="315" x2="920" y2="315" stroke="rgba(52,160,140,0.08)" stroke-width="1"/>
  <line x1="360" y1="270" x2="840" y2="270" stroke="rgba(52,160,140,0.08)" stroke-width="1"/>
  <line x1="430" y1="235" x2="770" y2="235" stroke="rgba(52,160,140,0.09)" stroke-width="1"/>

  <!-- Glow at vanishing point -->
  <circle cx="600" cy="200" r="120" fill="rgba(34,145,127,0.08)"/>
  <circle cx="600" cy="200" r="60"  fill="rgba(34,145,127,0.10)"/>
  <circle cx="600" cy="200" r="20"  fill="rgba(34,145,127,0.25)"/>

  <!-- Abstract building blocks (isometric flat tops) -->
  <!-- Block 1 (left) -->
  <polygon points="250,460 310,430 370,460 310,490" fill="rgba(52,160,140,0.14)"/>
  <polygon points="250,460 250,500 310,530 310,490" fill="rgba(52,160,140,0.08)"/>
  <polygon points="310,490 310,530 370,500 370,460" fill="rgba(52,160,140,0.10)"/>

  <!-- Block 2 (center-left, taller) -->
  <polygon points="400,390 480,350 560,390 480,430" fill="rgba(52,160,140,0.18)"/>
  <polygon points="400,390 400,460 480,500 480,430" fill="rgba(52,160,140,0.10)"/>
  <polygon points="480,430 480,500 560,460 560,390" fill="rgba(52,160,140,0.13)"/>

  <!-- Block 3 (center, tallest) -->
  <polygon points="520,310 620,265 720,310 620,355" fill="rgba(52,160,140,0.25)"/>
  <polygon points="520,310 520,410 620,455 620,355" fill="rgba(52,160,140,0.13)"/>
  <polygon points="620,355 620,455 720,410 720,310" fill="rgba(52,160,140,0.17)"/>
  <!-- Top accent line -->
  <line x1="520" y1="310" x2="720" y2="310" stroke="rgba(52,160,140,0.50)" stroke-width="1"/>
  <line x1="520" y1="310" x2="620" y2="265" stroke="rgba(52,160,140,0.50)" stroke-width="1"/>
  <line x1="720" y1="310" x2="620" y2="265" stroke="rgba(52,160,140,0.50)" stroke-width="1"/>

  <!-- Block 4 (center-right) -->
  <polygon points="680,390 760,350 840,390 760,430" fill="rgba(52,160,140,0.18)"/>
  <polygon points="680,390 680,460 760,500 760,430" fill="rgba(52,160,140,0.10)"/>
  <polygon points="760,430 760,500 840,460 840,390" fill="rgba(52,160,140,0.13)"/>

  <!-- Block 5 (right) -->
  <polygon points="840,460 900,430 960,460 900,490" fill="rgba(52,160,140,0.14)"/>
  <polygon points="840,460 840,500 900,530 900,490" fill="rgba(52,160,140,0.08)"/>
  <polygon points="900,490 900,530 960,500 960,460" fill="rgba(52,160,140,0.10)"/>

  <!-- Corner accent dots -->
  <g fill="rgba(52,160,140,0.20)">
    <circle cx="80"  cy="80"  r="2"/><circle cx="110" cy="80"  r="2"/><circle cx="140" cy="80"  r="2"/>
    <circle cx="80"  cy="110" r="2"/><circle cx="110" cy="110" r="2"/><circle cx="140" cy="110" r="2"/>
  </g>
  <g fill="rgba(52,160,140,0.15)">
    <circle cx="1060" cy="80"  r="2"/><circle cx="1090" cy="80"  r="2"/><circle cx="1120" cy="80"  r="2"/>
    <circle cx="1060" cy="110" r="2"/><circle cx="1090" cy="110" r="2"/><circle cx="1120" cy="110" r="2"/>
  </g>

  <line x1="0" y1="600" x2="1200" y2="600" stroke="rgba(52,160,140,0.10)" stroke-width="1"/>
  <text x="60" y="580" font-family="system-ui, sans-serif" font-size="11" font-weight="600"
    letter-spacing="0.18em" fill="rgba(255,255,255,0.20)">THẮNG SWC · ATLAS</text>
</svg>
