<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#091f1d"/>
      <stop offset="58%" stop-color="#061614"/>
      <stop offset="100%" stop-color="#040d0c"/>
    </linearGradient>
    <radialGradient id="glow-hub" cx="36%" cy="52%" r="32%">
      <stop offset="0%" stop-color="#22917f" stop-opacity="0.17"/>
      <stop offset="100%" stop-color="#22917f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-tr" cx="80%" cy="22%" r="26%">
      <stop offset="0%" stop-color="#2ab39e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2ab39e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow-hub)"/>
  <rect width="1600" height="900" fill="url(#glow-tr)"/>

  <!-- Subtle perspective grid (vanishing point right) -->
  <g stroke="rgba(52,160,140,0.04)" stroke-width="1">
    <line x1="0"   y1="900" x2="1600" y2="450"/>
    <line x1="0"   y1="750" x2="1600" y2="450"/>
    <line x1="0"   y1="600" x2="1600" y2="450"/>
    <line x1="0"   y1="450" x2="1600" y2="450"/>
    <line x1="0"   y1="300" x2="1600" y2="450"/>
    <line x1="0"   y1="150" x2="1600" y2="450"/>
    <line x1="0"   y1="0"   x2="1600" y2="450"/>
  </g>
  <!-- Cross lines (horizontal foreshortened) -->
  <g stroke="rgba(52,160,140,0.035)" stroke-width="1">
    <line x1="0" y1="630" x2="1600" y2="630"/>
    <line x1="60" y1="558" x2="1540" y2="558"/>
    <line x1="140" y1="486" x2="1460" y2="486"/>
    <line x1="240" y1="420" x2="1360" y2="420"/>
    <line x1="360" y1="360" x2="1240" y2="360"/>
  </g>

  <!-- Fine background grid (structural) -->
  <g stroke="rgba(52,160,140,0.028)" stroke-width="1">
    <line x1="0"    y1="200" x2="1600" y2="200"/>
    <line x1="0"    y1="400" x2="1600" y2="400"/>
    <line x1="0"    y1="700" x2="1600" y2="700"/>
    <line x1="400"  y1="0" x2="400"  y2="900"/>
    <line x1="800"  y1="0" x2="800"  y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>

  <!-- Hub node — main property cluster (center-left) -->
  <circle cx="540" cy="460" r="80"  fill="rgba(52,160,140,0.04)"/>
  <circle cx="540" cy="460" r="52"  fill="rgba(52,160,140,0.07)"/>
  <circle cx="540" cy="460" r="30"  fill="rgba(52,160,140,0.13)"/>
  <circle cx="540" cy="460" r="14"  fill="rgba(52,160,140,0.65)"/>
  <circle cx="540" cy="460" r="5.5" fill="rgba(255,255,255,0.50)"/>
  <!-- Hub verification ring -->
  <circle cx="540" cy="460" r="100" stroke="rgba(52,160,140,0.10)" stroke-width="1" fill="none" stroke-dasharray="4 8"/>

  <!-- Satellite nodes — properties in the network -->
  <!-- Node A — upper left -->
  <circle cx="260" cy="240" r="14" fill="rgba(52,160,140,0.55)"/>
  <circle cx="260" cy="240" r="26" fill="rgba(52,160,140,0.11)"/>
  <circle cx="260" cy="240" r="6"  fill="rgba(255,255,255,0.35)"/>

  <!-- Node B — top center -->
  <circle cx="700" cy="160" r="10" fill="rgba(52,160,140,0.48)"/>
  <circle cx="700" cy="160" r="20" fill="rgba(52,160,140,0.09)"/>
  <circle cx="700" cy="160" r="4.5" fill="rgba(255,255,255,0.30)"/>

  <!-- Node C — upper right (premium, larger) -->
  <circle cx="1080" cy="220" r="18" fill="rgba(52,160,140,0.58)"/>
  <circle cx="1080" cy="220" r="34" fill="rgba(52,160,140,0.12)"/>
  <circle cx="1080" cy="220" r="50" fill="rgba(52,160,140,0.04)"/>
  <circle cx="1080" cy="220" r="8"  fill="rgba(255,255,255,0.40)"/>
  <!-- Verification mark on premium node -->
  <circle cx="1080" cy="220" r="60" stroke="rgba(52,160,140,0.14)" stroke-width="1" fill="none" stroke-dasharray="3 6"/>

  <!-- Node D — right center -->
  <circle cx="1340" cy="460" r="12" fill="rgba(52,160,140,0.52)"/>
  <circle cx="1340" cy="460" r="24" fill="rgba(52,160,140,0.10)"/>
  <circle cx="1340" cy="460" r="5"  fill="rgba(255,255,255,0.32)"/>

  <!-- Node E — lower right -->
  <circle cx="1180" cy="680" r="10" fill="rgba(52,160,140,0.45)"/>
  <circle cx="1180" cy="680" r="20" fill="rgba(52,160,140,0.09)"/>
  <circle cx="1180" cy="680" r="4.5" fill="rgba(255,255,255,0.28)"/>

  <!-- Node F — lower left -->
  <circle cx="320"  cy="680" r="8"  fill="rgba(52,160,140,0.40)"/>
  <circle cx="320"  cy="680" r="16" fill="rgba(52,160,140,0.08)"/>

  <!-- Node G — far right -->
  <circle cx="1500" cy="320" r="8"  fill="rgba(52,160,140,0.38)"/>
  <circle cx="1500" cy="320" r="16" fill="rgba(52,160,140,0.07)"/>

  <!-- Connection lines — hub to satellites -->
  <line x1="540" y1="460" x2="260" y2="240" stroke="rgba(52,160,140,0.22)" stroke-width="1.5"/>
  <line x1="540" y1="460" x2="700" y2="160" stroke="rgba(52,160,140,0.18)" stroke-width="1.5"/>
  <line x1="540" y1="460" x2="1080" y2="220" stroke="rgba(52,160,140,0.20)" stroke-width="1.5"/>
  <line x1="540" y1="460" x2="1340" y2="460" stroke="rgba(52,160,140,0.25)" stroke-width="2"/>
  <line x1="540" y1="460" x2="1180" y2="680" stroke="rgba(52,160,140,0.18)" stroke-width="1.5"/>
  <line x1="540" y1="460" x2="320"  y2="680" stroke="rgba(52,160,140,0.16)" stroke-width="1.5"/>

  <!-- Inter-satellite connections (secondary) -->
  <line x1="260"  y1="240" x2="700"  y2="160" stroke="rgba(52,160,140,0.10)" stroke-width="1" stroke-dasharray="5 7"/>
  <line x1="700"  y1="160" x2="1080" y2="220" stroke="rgba(52,160,140,0.10)" stroke-width="1" stroke-dasharray="5 7"/>
  <line x1="1080" y1="220" x2="1340" y2="460" stroke="rgba(52,160,140,0.12)" stroke-width="1" stroke-dasharray="5 7"/>
  <line x1="1340" y1="460" x2="1180" y2="680" stroke="rgba(52,160,140,0.10)" stroke-width="1" stroke-dasharray="5 7"/>
  <line x1="1340" y1="460" x2="1500" y2="320" stroke="rgba(52,160,140,0.08)" stroke-width="1" stroke-dasharray="4 9"/>

  <!-- Dot grid — top left -->
  <g fill="rgba(52,160,140,0.22)">
    <circle cx="80"  cy="72"  r="2.5"/><circle cx="120" cy="72"  r="2.5"/><circle cx="160" cy="72"  r="2.5"/>
    <circle cx="80"  cy="108" r="2.5"/><circle cx="120" cy="108" r="2.5"/><circle cx="160" cy="108" r="2"/>
    <circle cx="80"  cy="144" r="2"/>
  </g>

  <!-- Dot grid — bottom right -->
  <g fill="rgba(52,160,140,0.16)">
    <circle cx="1440" cy="830" r="2"/><circle cx="1480" cy="830" r="2"/><circle cx="1520" cy="830" r="2"/>
    <circle cx="1440" cy="860" r="2"/><circle cx="1480" cy="860" r="2"/>
  </g>

  <!-- Corner brackets -->
  <path d="M 44,44 L 44,88 L 80,88" stroke="rgba(52,160,140,0.28)" stroke-width="1.5" stroke-linecap="square" fill="none"/>
  <path d="M 1556,44 L 1556,88 L 1520,88" stroke="rgba(52,160,140,0.22)" stroke-width="1.5" stroke-linecap="square" fill="none"/>
  <path d="M 44,856 L 44,812 L 80,812" stroke="rgba(52,160,140,0.18)" stroke-width="1.5" stroke-linecap="square" fill="none"/>
  <path d="M 1556,856 L 1556,812 L 1520,812" stroke="rgba(52,160,140,0.15)" stroke-width="1.5" stroke-linecap="square" fill="none"/>

  <!-- Base rule -->
  <line x1="0" y1="878" x2="1600" y2="878" stroke="rgba(52,160,140,0.12)" stroke-width="1"/>
</svg>
