kind = "web"
previewPath = "/"
title = "Phan Văn Thắng SWC"
version = "1.0.0"
id = "artifacts/pvt-swc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20076

[services.development]
run = "pnpm --filter @workspace/pvt-swc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pvt-swc", "run", "build" ]
publicDir = "artifacts/pvt-swc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20076"
BASE_PATH = "/"
